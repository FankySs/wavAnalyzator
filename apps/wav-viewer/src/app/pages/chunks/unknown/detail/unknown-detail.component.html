<div class="info-panel">
  Unknown chunk type '{{ chunk().chunkId }}' – this type is not supported.
  Showing the first 256 bytes of raw data.
</div>

@if (hexDump(); as dump) {
  <div class="card hex-card">
    <pre class="hex-pre">{{ dump }}</pre>
  </div>
} @else {
  <p class="muted text-sm">Preview not available.</p>
}
