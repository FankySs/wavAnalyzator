<div class="card form-card">
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Title</label>
      <input class="form-input" maxlength="64" [(ngModel)]="cart.title" />
    </div>
    <div class="form-group">
      <label class="form-label">Artist</label>
      <input class="form-input" maxlength="64" [(ngModel)]="cart.artist" />
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">Category</label>
    <input class="form-input" maxlength="64" [(ngModel)]="cart.category" />
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Start Date</label>
      <input class="form-input" type="date" [(ngModel)]="cart.startDate" />
    </div>
    <div class="form-group">
      <label class="form-label">Start Time</label>
      <input class="form-input" type="time" step="1" [(ngModel)]="cart.startTime" />
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">End Date</label>
      <input class="form-input" type="date" [(ngModel)]="cart.endDate" />
    </div>
    <div class="form-group">
      <label class="form-label">End Time</label>
      <input class="form-input" type="time" step="1" [(ngModel)]="cart.endTime" />
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">URL (optional)</label>
    <input class="form-input" type="url" [(ngModel)]="cart.url" />
  </div>
</div>
<div class="form-actions">
  <button class="btn" [disabled]="isDisabled()" (click)="onCancel()">Cancel</button>
  <button class="btn btn-primary" [disabled]="isDisabled()" (click)="onSubmit()">
    @if (isDisabled()) { Saving… } @else { Add chunk }
  </button>
</div>
